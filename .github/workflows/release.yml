name: Release Build

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-launcher:
    name: Build Cognithor.exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish Cognithor.exe
        run: |
          dotnet publish launcher/Cognithor/Cognithor.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -p:TrimMode=partial `
            -o publish/launcher

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher
          path: publish/launcher/Cognithor.exe

  build-flutter-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Generate l10n + Build web
        working-directory: flutter_app
        run: |
          flutter pub get
          flutter gen-l10n
          flutter build web --release --no-tree-shake-icons

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web
          path: flutter_app/build/web/

  build-flutter-desktop:
    name: Build Flutter Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Clean build + generate l10n + build desktop
        working-directory: flutter_app
        run: |
          flutter clean
          flutter pub get
          flutter gen-l10n
          flutter build windows --release

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-desktop
          path: flutter_app/build/windows/x64/runner/Release/

  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: [build-launcher, build-flutter-web, build-flutter-desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download launcher artifact
        uses: actions/download-artifact@v4
        with:
          name: launcher
          path: installer/build/

      - name: Download Flutter web artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web
          path: installer/build/flutter_web/

      - name: Download Flutter desktop artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-desktop
          path: installer/build/flutter_desktop/

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build embedded Python + installer
        run: |
          pip install hatchling
          python installer/build_installer.py
        env:
          SKIP_LAUNCHER_EXE: "1"
          SKIP_FLUTTER_BUILD: "1"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer/dist/CognithorSetup-*.exe

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-installer, build-launcher, build-flutter-web]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Cognithor ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/installer/CognithorSetup-*.exe
            artifacts/launcher/Cognithor.exe
