name: "Cognithor CodeQL Config"

# Exclude Flutter/Android Kotlin and Gradle files from analysis.
# These are auto-generated by Flutter and not part of the Python backend.
paths-ignore:
  - flutter_app
  - flutter_app/android
  - flutter_app/ios
  - flutter_app/windows
  - flutter_app/linux
  - flutter_app/macos
  - "**/*.gradle"
  - "**/*.gradle.kts"
  - "**/gradle-wrapper.properties"
