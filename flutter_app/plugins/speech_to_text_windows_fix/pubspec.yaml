name: speech_to_text_windows
description: Fixed Windows SAPI implementation for speech_to_text (forked from v1.0.0+beta.8)
version: 1.0.1
homepage: https://github.com/Alex8791-cyber/cognithor

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  speech_to_text_platform_interface: ^2.3.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: SpeechToTextWindowsPlugin
